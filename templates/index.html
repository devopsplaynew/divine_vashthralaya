<!DOCTYPE html>
<html>
<head>
<title>Divine Vasthralaya</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* GLOBAL */
body { margin:0; font-family:'Segoe UI'; background:#f4f6f9; }

/* HEADER */
.header {
    background: linear-gradient(135deg,#000,#1c1c1c,#2c2c2c);
    padding:12px 20px;
    position:fixed;
    width:100%;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* GOLDEN TITLE */
.title {
    font-size:26px;
    font-weight:bold;
    background: linear-gradient(45deg,#FFD700,#ffcc00,#fff176);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* COLUMN WIDTH CONTROL */
th:nth-child(1), td:nth-child(1) { width: 140px; } /* Date */
th:nth-child(2), td:nth-child(2) { width: 120px; } /* Type */
th:nth-child(3), td:nth-child(3) { width: 300px; } /* Category (WIDE) */
th:nth-child(4), td:nth-child(4) { width: 120px; } /* Amount (SMALL) */
th:nth-child(5), td:nth-child(5) { width: 140px; } /* Spender (MEDIUM) */
th:nth-child(6), td:nth-child(6) { width: 80px; }  /* Save */
th:nth-child(7), td:nth-child(7) { width: 80px; }  /* Delete */

/* Prevent overflow breaking UI */
td input {
    width: 100%;
}

/* Optional: truncate very long text nicely */
td:nth-child(3) input {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
/* LOGO */
.logo {
    height:100px;
}

/* SIDEBAR (REDUCED WIDTH) */
.sidebar {
    width:180px;
    height:100vh;
    position:fixed;
    top:80px;
    background:#111;
}

.sidebar a {
    display:block;
    color:#ddd;
    padding:12px;
    text-decoration:none;
}

.sidebar a:hover {
    background:#FFD700;
    color:black;
}

/* CONTENT */
.content {
    margin-left:180px;
    margin-top:100px;
    padding:20px;
}

/* CARDS */
.card-box {
    padding:15px;
    border-radius:10px;
    color:white;
    text-align:center;
    font-weight:bold;
}

.income { background:#4CAF50; }
.expense { background:#fbc02d; color:black; }
.balance { background:#343a40; }

/* TABLE FIX */
table {
    table-layout:auto !important;
    width:100%;
}

td, th {
    white-space:nowrap;
}

/* STRONG ROW COLORS */
.row-income td {
    background-color:#c8e6c9 !important;
}

.row-expense td {
    background-color:#fff59d !important;
}

/* CHART SIZE CONTROL */
.chart-box {
    height:300px;
}

</style>
</head>

<body>

<div class="header">

<div class="d-flex align-items-center">
<img src="{{ url_for('static', filename='logo.png') }}" class="logo me-3">
<div class="title">Divine Vasthralaya</div>
</div>

<a href="/logout" class="btn btn-outline-warning btn-sm">Logout</a>

</div>

<div class="sidebar">
<a href="/">Dashboard</a>
<a href="/stocks">Stock Tracker</a>
</div>

<div class="content">

<!-- SUMMARY -->
<div class="row text-center">
<div class="col-md-4"><div class="card-box income">Income ₹{{income}}</div></div>
<div class="col-md-4"><div class="card-box expense">Expense ₹{{expense}}</div></div>
<div class="col-md-4"><div class="card-box balance">Balance ₹{{balance}}</div></div>
</div>

<!-- ADD FORM -->
<form method="POST" action="/add" class="row mt-4">
<div class="col"><select name="type" class="form-control"><option>Income</option><option>Expense</option></select></div>
<div class="col"><input name="category" class="form-control" placeholder="Category"></div>
<div class="col"><input name="amount" type="number" class="form-control" placeholder="Amount"></div>
<div class="col"><input name="spender" class="form-control" placeholder="Spender"></div>
<div class="col"><button class="btn btn-success w-100">Add</button></div>
</form>

<h5 class="mt-4">Daily Records</h5>

<table class="table table-bordered mt-2">
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Category</th>
<th>Amount</th>
<th>Spender</th>
<th>Save</th>
<th>Delete</th>
</tr>
</thead>

<tbody>
{% for r in records %}
<tr class="{% if r.Type=='Income' %}row-income{% else %}row-expense{% endif %}">
<form method="POST" action="/update">

<input type="hidden" name="row_id" value="{{r.index}}">

<td><input type="date" name="date" value="{{r.Date}}" class="form-control"></td>

<td>
<select name="type" class="form-control">
<option {% if r.Type=='Income' %}selected{% endif %}>Income</option>
<option {% if r.Type=='Expense' %}selected{% endif %}>Expense</option>
</select>
</td>

<td><input name="category" value="{{r.Category}}" class="form-control"></td>

<td><input type="number" name="amount" value="{{r.Amount}}" class="form-control"></td>

<td><input name="spender" value="{{r.Spender}}" class="form-control"></td>

<td><button class="btn btn-success btn-sm">Save</button></td>

<td><a href="/delete/{{r.index}}" class="btn btn-danger btn-sm">Delete</a></td>

</form>
</tr>
{% endfor %}
</tbody>
</table>

<!-- CHARTS -->
<div class="row mt-4">
<div class="col-md-6">
<div class="chart-box">
<canvas id="pieChart"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="chart-box">
<canvas id="barChart"></canvas>
</div>
</div>
</div>

</div>

<script>

// PIE (smaller size)
new Chart(document.getElementById('pieChart'),{
type:'pie',
data:{
labels:['Income','Expense'],
datasets:[{data:[{{income}},{{expense}}]}]
},
options:{maintainAspectRatio:false}
});

// BAR
let spenderData = {};
{% for r in records %}
spenderData["{{r.Spender}}"] = (spenderData["{{r.Spender}}"] || 0) + Number("{{r.Amount}}");
{% endfor %}

new Chart(document.getElementById('barChart'),{
type:'bar',
data:{
labels:Object.keys(spenderData),
datasets:[{label:'Spender Wise Total',data:Object.values(spenderData)}]
},
options:{maintainAspectRatio:false}
});

</script>

</body>
</html>
