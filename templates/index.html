<!DOCTYPE html>
<html>
<head>
<title>Divine Vasthralaya</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #f4f6f9;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #000000, #1c1c1c, #2c2c2c);
    color: #FFD700;
    padding: 12px 20px;
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 1000;
}

.header img {
    height: 65px;
    width: auto;
}

.header h4 {
    margin: 0;
    color: #FFD700;
    font-weight: bold;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    top: 70px;
    left: 0;
    background: #111;
    color: white;
    padding-top: 20px;
}

.sidebar a {
    display: block;
    color: #ddd;
    padding: 12px 20px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #FFD700;
    color: black;
}

/* CONTENT */
.content {
    margin-left: 220px;
    margin-top: 80px;
    padding: 20px;
}

/* CARDS */
.card-box {
    padding: 15px;
    border-radius: 10px;
    color: white;
    text-align: center;
    font-weight: bold;
}

.income { background:#28a745; }
.expense { background:#fd7e14; }
.balance { background:#343a40; }

/* TABLE */
.table thead {
    background: black;
    color: white;
}

.delete-btn {
    background: red;
    color: white;
    border: none;
    padding: 5px 10px;
}

/* PIE SIZE */
#categoryChart {
    max-height: 250px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
        <img src="{{ url_for('static', filename='logo.png') }}" class="me-3">
        <h4>Divine Vasthralaya</h4>
    </div>
    <a href="/logout" class="btn btn-outline-warning btn-sm">Logout</a>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="/">Dashboard</a>
    <a href="/stocks">Stock Tracker</a>
</div>

<!-- CONTENT -->
<div class="content">

<!-- SUMMARY -->
<div class="row text-center">
    <div class="col-md-4"><div class="card-box income">Income ₹{{income}}</div></div>
    <div class="col-md-4"><div class="card-box expense">Expense ₹{{expense}}</div></div>
    <div class="col-md-4"><div class="card-box balance">Balance ₹{{balance}}</div></div>
</div>

<!-- ADD FORM -->
<form method="POST" action="/add" class="row mt-4">
    <div class="col">
        <select name="type" class="form-control">
            <option>Income</option>
            <option>Expense</option>
        </select>
    </div>
    <div class="col"><input name="category" class="form-control" placeholder="Category"></div>
    <div class="col"><input name="amount" type="number" class="form-control" placeholder="Amount"></div>
    <div class="col"><button class="btn btn-success w-100">Add</button></div>
</form>

<div class="mt-3">
    <a href="/download" class="btn btn-warning">Download Excel</a>
</div>

<!-- SEARCH -->
<input type="text" id="searchInput" class="form-control mt-4" placeholder="Search records...">

<!-- TABLE -->
<div class="mt-3">
<h5>Daily Records</h5>
<table class="table table-bordered table-hover">
<thead>
<tr>
    <th>Date</th>
    <th>Type</th>
    <th>Category</th>
    <th>Amount</th>
    <th>Action</th>
</tr>
</thead>

<tbody>
{% for r in records %}
<tr class="{% if r.Type=='Income' %}table-success{% else %}table-warning{% endif %}">
<td>{{r.Date}}</td>
<td>{{r.Type}}</td>
<td>{{r.Category}}</td>
<td>{{r.Amount}}</td>
<td>
    <form method="POST" action="/delete" onsubmit="return confirm('Delete this record?');">
        <input type="hidden" name="date" value="{{r.Date}}">
        <input type="hidden" name="category" value="{{r.Category}}">
        <input type="hidden" name="amount" value="{{r.Amount}}">
        <button class="delete-btn">Delete</button>
    </form>
</td>
</tr>
{% endfor %}
</tbody>
</table>
</div>

<!-- CHARTS -->
<div class="row mt-4">
    <div class="col-md-7">
        <canvas id="dailyChart"></canvas>
    </div>
    <div class="col-md-5">
        <canvas id="categoryChart"></canvas>
    </div>
</div>

</div>

<!-- SCRIPTS -->
<script>

// SEARCH FILTER
document.getElementById("searchInput").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    document.querySelectorAll("tbody tr").forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
    });
});

// CHARTS
new Chart(document.getElementById('dailyChart'), {
type:'line',
data:{
labels: {{daily_labels|tojson}},
datasets:[
{label:'Income', data: {{income_data|tojson}}},
{label:'Expense', data: {{expense_data|tojson}}}
]
}
});

new Chart(document.getElementById('categoryChart'), {
type:'pie',
data:{
labels: {{categories|tojson}},
datasets:[{data: {{category_values|tojson}}}]
}
});

</script>

</body>
</html>
