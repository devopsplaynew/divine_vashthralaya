<!DOCTYPE html>
<html>
<head>
<title>Divine Vasthralaya</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #f4f6f9;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #000000, #1c1c1c, #2c2c2c);
    color: #FFD700;
    padding: 12px 20px;
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 1000;
}

.header img {
    height: 65px;
}

.header h4 {
    color: #FFD700;
    margin: 0;
}

/* MOBILE MENU BUTTON */
.menu-btn {
    display: none;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    top: 70px;
    left: 0;
    background: #111;
    padding-top: 20px;
}

.sidebar a {
    display: block;
    color: #ddd;
    padding: 12px 20px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #FFD700;
    color: black;
}

/* CONTENT */
.content {
    margin-left: 220px;
    margin-top: 80px;
    padding: 20px;
}

/* CARDS */
.card-box {
    padding: 15px;
    border-radius: 10px;
    color: white;
    text-align: center;
    font-weight: bold;
}

.income { background:#28a745; }
.expense { background:#fd7e14; }
.balance { background:#343a40; }

/* TABLE */
.table thead {
    background: black;
    color: white;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
    .sidebar {
        display: none;
        position: absolute;
        z-index: 1000;
    }

    .content {
        margin-left: 0;
    }

    .menu-btn {
        display: block;
        color: white;
        font-size: 20px;
        cursor: pointer;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center">

    <div class="d-flex align-items-center">
        <span class="menu-btn me-3" onclick="toggleSidebar()">☰</span>
        <img src="{{ url_for('static', filename='logo.png') }}" class="me-3">
        <h4>Divine Vasthralaya</h4>
    </div>

    <a href="/logout" class="btn btn-outline-warning btn-sm">Logout</a>

</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a href="/">Dashboard</a>
    <a href="/stocks">Stock Tracker</a>
</div>

<!-- CONTENT -->
<div class="content">

<!-- SUMMARY -->
<div class="row text-center">
    <div class="col-md-4"><div class="card-box income">Income ₹{{income}}</div></div>
    <div class="col-md-4"><div class="card-box expense">Expense ₹{{expense}}</div></div>
    <div class="col-md-4"><div class="card-box balance">Balance ₹{{balance}}</div></div>
</div>

<!-- FILTER BUTTONS -->
<div class="mt-3">
    <a href="/?filter=today" class="btn btn-outline-primary btn-sm">Today</a>
    <a href="/?filter=week" class="btn btn-outline-primary btn-sm">Week</a>
    <a href="/?filter=month" class="btn btn-outline-primary btn-sm">Month</a>
    <a href="/" class="btn btn-secondary btn-sm">All</a>
</div>

<!-- ADD FORM -->
<form method="POST" action="/add" class="row mt-4">
    <div class="col">
        <select name="type" class="form-control">
            <option>Income</option>
            <option>Expense</option>
        </select>
    </div>
    <div class="col"><input name="category" class="form-control" placeholder="Category"></div>
    <div class="col"><input name="amount" type="number" class="form-control" placeholder="Amount"></div>
    <div class="col"><input name="spender" class="form-control" placeholder="Spender"></div>
    <div class="col"><button class="btn btn-success w-100">Add</button></div>
</form>

<div class="mt-3">
    <a href="/download" class="btn btn-warning">Download Excel</a>
</div>

<!-- SEARCH -->
<input type="text" id="searchInput" class="form-control mt-4" placeholder="Search records...">

<!-- TABLE -->
<div class="mt-3">
<h5>Daily Records</h5>

<table class="table table-bordered table-hover">
<thead>
<tr>
    <th>Date</th>
    <th>Type</th>
    <th>Category</th>
    <th>Amount</th>
    <th>Spender</th>
    <th>Save</th>
    <th>Delete</th>
</tr>
</thead>

<tbody>
{% for r in records %}
<tr>
<form method="POST" action="/update">

<input type="hidden" name="row_id" value="{{r.index}}">

<td><input name="date" value="{{r.Date}}" class="form-control"></td>

<td>
<select name="type" class="form-control">
<option {% if r.Type=='Income' %}selected{% endif %}>Income</option>
<option {% if r.Type=='Expense' %}selected{% endif %}>Expense</option>
</select>
</td>

<td><input name="category" value="{{r.Category}}" class="form-control"></td>

<td><input name="amount" value="{{r.Amount}}" class="form-control"></td>

<td><input name="spender" value="{{r.Spender}}" class="form-control"></td>

<td><button class="btn btn-success btn-sm">Save</button></td>

<td>
<a href="/delete/{{r.index}}" 
   class="btn btn-danger btn-sm"
   onclick="return confirm('Delete this record?')">
   Delete
</a>
</td>

</form>
</tr>
{% endfor %}
</tbody>
</table>
</div>

<!-- CHARTS -->
<div class="row mt-4">
    <div class="col-md-6">
        <canvas id="pieChart"></canvas>
    </div>
    <div class="col-md-6">
        <canvas id="barChart"></canvas>
    </div>
</div>

</div>

<!-- SCRIPTS -->
<script>

// SIDEBAR TOGGLE
function toggleSidebar(){
    let sidebar = document.getElementById("sidebar");
    sidebar.style.display = (sidebar.style.display === "block") ? "none" : "block";
}

// SEARCH FILTER
document.getElementById("searchInput").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    document.querySelectorAll("tbody tr").forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
    });
});

// PIE → Income vs Expense
new Chart(document.getElementById('pieChart'), {
type:'pie',
data:{
labels:['Income','Expense'],
datasets:[{
data:[{{income}},{{expense}}]
}]
}
});

// BAR → Spender
let spenderData = {};
{% for r in records %}
spenderData["{{r.Spender}}"] = (spenderData["{{r.Spender}}"] || 0) + Number("{{r.Amount}}");
{% endfor %}

new Chart(document.getElementById('barChart'), {
type:'bar',
data:{
labels:Object.keys(spenderData),
datasets:[{
label:'Spender Wise Total',
data:Object.values(spenderData)
}]
}
});

</script>

</body>
</html>
