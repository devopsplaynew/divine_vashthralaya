<!DOCTYPE html>
<html>
<head>
<title>Divine Vasthralaya</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #f4f6f9;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #000000, #1c1c1c, #2c2c2c);
    color: #FFD700;
    padding: 12px 20px;
    position: fixed;
    width: 100%;
    top: 0;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    top: 70px;
    background: #111;
}

.sidebar a {
    display: block;
    color: #ddd;
    padding: 12px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #FFD700;
    color: black;
}

/* CONTENT */
.content {
    margin-left: 220px;
    margin-top: 80px;
    padding: 20px;
}

/* SUMMARY CARDS */
.card-box {
    padding: 15px;
    border-radius: 10px;
    color: white;
    text-align: center;
    font-weight: bold;
}

.income { background:#66bb6a; }
.expense { background:#fdd835; color:black; }
.balance { background:#343a40; }

/* TABLE */
.table thead {
    background: black;
    color: white;
}

/* ROW COLORS */
.row-income {
    background-color: #d4edda !important;
}

.row-expense {
    background-color: #fff3cd !important;
}

/* MOBILE */
@media (max-width:768px){
.sidebar{display:none;}
.content{margin-left:0;}
}

</style>
</head>

<body>

<div class="header d-flex justify-content-between">
<div class="d-flex align-items-center">
<span onclick="toggleSidebar()" style="cursor:pointer;color:white;margin-right:10px;">☰</span>
<img src="{{ url_for('static', filename='logo.png') }}" height="60">
<h4 class="ms-3">Divine Vasthralaya</h4>
</div>
<a href="/logout" class="btn btn-outline-warning btn-sm">Logout</a>
</div>

<div class="sidebar" id="sidebar">
<a href="/">Dashboard</a>
<a href="/stocks">Stock Tracker</a>
</div>

<div class="content">

<!-- SUMMARY -->
<div class="row text-center">
<div class="col-md-4"><div class="card-box income">Income ₹{{income}}</div></div>
<div class="col-md-4"><div class="card-box expense">Expense ₹{{expense}}</div></div>
<div class="col-md-4"><div class="card-box balance">Balance ₹{{balance}}</div></div>
</div>

<!-- ADD FORM -->
<form method="POST" action="/add" class="row mt-4">
<div class="col">
<select name="type" class="form-control">
<option>Income</option>
<option>Expense</option>
</select>
</div>
<div class="col"><input name="category" class="form-control" placeholder="Category"></div>
<div class="col"><input name="amount" type="number" class="form-control" placeholder="Amount"></div>
<div class="col"><input name="spender" class="form-control" placeholder="Spender"></div>
<div class="col"><button class="btn btn-success w-100">Add</button></div>
</form>

<!-- SEARCH -->
<input type="text" id="searchInput" class="form-control mt-4" placeholder="Search records...">

<!-- TABLE -->
<h5 class="mt-3">Daily Records</h5>

<table class="table table-bordered table-hover">
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Category</th>
<th>Amount</th>
<th>Spender</th>
<th>Save</th>
<th>Delete</th>
</tr>
</thead>

<tbody>
{% for r in records %}
<tr class="{% if r.Type=='Income' %}row-income{% else %}row-expense{% endif %}">
<form method="POST" action="/update">

<input type="hidden" name="row_id" value="{{r.index}}">

<!-- FIXED DATE FORMAT -->
<td>
<input type="date" name="date"
value="{{ r.Date.strftime('%Y-%m-%d') if r.Date else '' }}"
class="form-control">
</td>

<td>
<select name="type" class="form-control">
<option {% if r.Type=='Income' %}selected{% endif %}>Income</option>
<option {% if r.Type=='Expense' %}selected{% endif %}>Expense</option>
</select>
</td>

<td><input name="category" value="{{r.Category}}" class="form-control"></td>

<td><input type="number" name="amount" value="{{r.Amount}}" class="form-control"></td>

<td><input name="spender" value="{{r.Spender}}" class="form-control"></td>

<td><button class="btn btn-success btn-sm">Save</button></td>

<td>
<a href="/delete/{{r.index}}" 
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this record?')">
Delete
</a>
</td>

</form>
</tr>
{% endfor %}
</tbody>
</table>

<!-- CHARTS -->
<div class="row mt-4">
<div class="col-md-6"><canvas id="pieChart"></canvas></div>
<div class="col-md-6"><canvas id="barChart"></canvas></div>
</div>

</div>

<script>

// SIDEBAR
function toggleSidebar(){
let s=document.getElementById("sidebar");
s.style.display=(s.style.display==="block")?"none":"block";
}

// SEARCH
document.getElementById("searchInput").addEventListener("keyup", function() {
let value = this.value.toLowerCase();
document.querySelectorAll("tbody tr").forEach(row => {
row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
});
});

// PIE
new Chart(document.getElementById('pieChart'),{
type:'pie',
data:{
labels:['Income','Expense'],
datasets:[{data:[{{income}},{{expense}}]}]
}
});

// BAR
let spenderData = {};
{% for r in records %}
spenderData["{{r.Spender}}"] = (spenderData["{{r.Spender}}"] || 0) + Number("{{r.Amount}}");
{% endfor %}

new Chart(document.getElementById('barChart'),{
type:'bar',
data:{
labels:Object.keys(spenderData),
datasets:[{
label:'Spender Wise Total',
data:Object.values(spenderData)
}]
},
options:{
scales:{
x:{ticks:{autoSkip:false}}
}
}
});

</script>

</body>
</html>
