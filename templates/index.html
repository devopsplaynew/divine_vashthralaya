<!DOCTYPE html>
<html>
<head>
<title>Divine Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#f5f5f5; }
.card { padding:15px; border-radius:10px; }
.income { background:#28a745; color:white; }
.expense { background:#fd7e14; color:white; }
.balance { background:#343a40; color:white; }
</style>
</head>

<body>
<div class="container">

<div class="text-center mt-3">
    <img src="/static/logo.png" width="120">
    <h3>Divine Vasthralaya</h3>
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</div>

<!-- SUMMARY -->
<div class="row mt-3 text-center">
    <div class="col"><div class="card income">Income ₹{{income}}</div></div>
    <div class="col"><div class="card expense">Expense ₹{{expense}}</div></div>
    <div class="col"><div class="card balance">Balance ₹{{balance}}</div></div>
</div>

<!-- ADD -->
<form method="POST" action="/add" class="row mt-4">
    <div class="col">
        <select name="type" class="form-control">
            <option>Income</option>
            <option>Expense</option>
        </select>
    </div>
    <div class="col"><input name="category" class="form-control" placeholder="Category"></div>
    <div class="col"><input name="amount" type="number" class="form-control" placeholder="Amount"></div>
    <div class="col"><button class="btn btn-success w-100">Add</button></div>
</form>

<div class="text-center mt-3">
    <a href="/download" class="btn btn-warning">Download Excel</a>
</div>

<!-- CHARTS -->
<div class="row mt-4">
    <div class="col-md-6"><canvas id="dailyChart"></canvas></div>
    <div class="col-md-6"><canvas id="categoryChart"></canvas></div>
</div>

<!-- TABLE -->
<div class="mt-4">
<table class="table table-bordered">
<thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Amount</th></tr></thead>
<tbody>
{% for r in records %}
<tr class="{% if r.Type=='Income' %}table-success{% else %}table-warning{% endif %}">
<td>{{r.Date}}</td>
<td>{{r.Type}}</td>
<td>{{r.Category}}</td>
<td>{{r.Amount}}</td>
</tr>
{% endfor %}
</tbody>
</table>
</div>

</div>

<script>
new Chart(document.getElementById('dailyChart'), {
type:'line',
data:{
labels: {{daily_labels|tojson}},
datasets:[
{label:'Income', data: {{income_data|tojson}}},
{label:'Expense', data: {{expense_data|tojson}}}
]
}
});

new Chart(document.getElementById('categoryChart'), {
type:'pie',
data:{
labels: {{categories|tojson}},
datasets:[{data: {{category_values|tojson}}}]
}
});
</script>

</body>
</html>
