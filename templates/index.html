<!DOCTYPE html>
<html>
<head>
<title>Divine Vasthralaya</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #f4f6f9;
    font-family: 'Segoe UI';
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    padding: 15px 20px;
    border-radius: 0 0 15px 15px;
}

.header img {
    height: 50px;
    opacity: 0.3;
}

/* CARDS */
.card {
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}

.income { background:#28a745; color:white; }
.expense { background:#fd7e14; color:white; }
.balance { background:#343a40; color:white; }

/* TABLE */
.table thead {
    background: #343a40;
    color: white;
}

/* BUTTON */
.delete-btn {
    background: red;
    color: white;
    border: none;
    padding: 5px 10px;
}
</style>
</head>

<body>

<div class="header d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
        <img src="/static/logo.png" class="me-2">
        <h4 class="mb-0">Divine Vasthralaya</h4>
    </div>

    <a href="/logout" class="btn btn-light btn-sm">Logout</a>
</div>

<div class="container mt-4">

<!-- SUMMARY -->
<div class="row text-center">
    <div class="col-md-4"><div class="card income">Income ₹{{income}}</div></div>
    <div class="col-md-4"><div class="card expense">Expense ₹{{expense}}</div></div>
    <div class="col-md-4"><div class="card balance">Balance ₹{{balance}}</div></div>
</div>

<!-- ADD -->
<form method="POST" action="/add" class="row mt-4">
    <div class="col">
        <select name="type" class="form-control">
            <option>Income</option>
            <option>Expense</option>
        </select>
    </div>
    <div class="col"><input name="category" class="form-control" placeholder="Category"></div>
    <div class="col"><input name="amount" type="number" class="form-control" placeholder="Amount"></div>
    <div class="col"><button class="btn btn-success w-100">Add</button></div>
</form>

<div class="text-center mt-3">
    <a href="/download" class="btn btn-warning">Download Excel</a>
</div>

<!-- TABLE FIRST -->
<div class="mt-4">
<h5>Daily Records</h5>
<table class="table table-bordered table-hover">
<thead>
<tr>
    <th>Date</th>
    <th>Type</th>
    <th>Category</th>
    <th>Amount</th>
    <th>Action</th>
</tr>
</thead>

<tbody>
{% for r in records %}
<tr class="{% if r.Type=='Income' %}table-success{% else %}table-warning{% endif %}">
<td>{{r.Date}}</td>
<td>{{r.Type}}</td>
<td>{{r.Category}}</td>
<td>{{r.Amount}}</td>
<td>
    <form method="POST" action="/delete" onsubmit="return confirm('Delete this record?');">
        <input type="hidden" name="date" value="{{r.Date}}">
        <input type="hidden" name="category" value="{{r.Category}}">
        <input type="hidden" name="amount" value="{{r.Amount}}">
        <button class="delete-btn">Delete</button>
    </form>
</td>
</tr>
{% endfor %}
</tbody>
</table>
</div>

<!-- CHARTS -->
<div class="row mt-4">
    <div class="col-md-7">
        <canvas id="dailyChart"></canvas>
    </div>
    <div class="col-md-5">
        <canvas id="categoryChart" style="max-height:300px;"></canvas>
    </div>
</div>

</div>

<script>
new Chart(document.getElementById('dailyChart'), {
type:'line',
data:{
labels: {{daily_labels|tojson}},
datasets:[
{label:'Income', data: {{income_data|tojson}}},
{label:'Expense', data: {{expense_data|tojson}}}
]
}
});

new Chart(document.getElementById('categoryChart'), {
type:'pie',
data:{
labels: {{categories|tojson}},
datasets:[{data: {{category_values|tojson}}}]
}
});
</script>

</body>
</html>
