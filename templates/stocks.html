<!DOCTYPE html>
<html>
<head>
<title>Stock Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="p-4">

<h3>Stock Tracker</h3>

<table class="table table-bordered">
<tr>
<th>ID</th><th>Item</th><th>Type</th>
<th>Actual</th><th>Sale</th><th>Diff</th><th>Sold</th><th>Save</th>
</tr>

{% for r in records %}
<tr>
<form method="POST" action="/update_stock">
<td><input name="id" value="{{r.ID}}" class="form-control"></td>
<td><input name="item" value="{{r.Item}}" class="form-control"></td>
<td><input name="type" value="{{r.Type}}" class="form-control"></td>
<td><input name="actual" value="{{r['Actual Price']}}" class="form-control"></td>
<td><input name="sale" value="{{r['Sale Price']}}" class="form-control"></td>
<td>{{r.Difference}}</td>
<td>
<select name="sold" class="form-control">
<option {% if r.Sold=='Y' %}selected{% endif %}>Y</option>
<option {% if r.Sold=='N' %}selected{% endif %}>N</option>
</select>
</td>
<td><button class="btn btn-success">Save</button></td>
</form>
</tr>
{% endfor %}
</table>

<canvas id="pie"></canvas>

<script>
new Chart(document.getElementById('pie'), {
type:'pie',
data:{
labels:['Sold','Pending'],
datasets:[{data:[{{sold}},{{pending}}]}]
}
});
</script>

</body>
</html>
