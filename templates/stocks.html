<!DOCTYPE html>
<html>
<head>
<title>Stock Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#f4f6f9; }

.header {
    background: linear-gradient(135deg,#000,#1c1c1c,#2c2c2c);
    color:#FFD700;
    padding:12px 20px;
    position:fixed;
    width:100%;
    top:0;
}

.header img { height:65px; }

.sidebar {
    width:220px;
    height:100vh;
    position:fixed;
    top:70px;
    background:#111;
}

.sidebar a {
    display:block;
    color:#ddd;
    padding:12px;
    text-decoration:none;
}

.sidebar a:hover {
    background:#FFD700;
    color:black;
}

.content {
    margin-left:220px;
    margin-top:80px;
    padding:20px;
}

.table thead { background:black; color:white; }

@media(max-width:768px){
.sidebar{display:none;}
.content{margin-left:0;}
}
</style>
</head>

<body>

<div class="header d-flex justify-content-between">
<div class="d-flex align-items-center">
<span onclick="toggleSidebar()" style="cursor:pointer;color:white;margin-right:10px;">☰</span>
<img src="{{ url_for('static', filename='logo.png') }}">
<h4 class="ms-3">Divine Vasthralaya</h4>
</div>
<a href="/logout" class="btn btn-outline-warning btn-sm">Logout</a>
</div>

<div class="sidebar" id="sidebar">
<a href="/">Dashboard</a>
<a href="/stocks">Stock Tracker</a>
</div>

<div class="content">

<h4>Stock Tracker</h4>

<form method="POST" action="/add_stock" class="row">
<input name="id" type="hidden">
<input name="date" type="hidden">

<div class="col"><input name="item" class="form-control" placeholder="Item"></div>
<div class="col"><input name="type" class="form-control" placeholder="Type"></div>
<div class="col"><input name="actual" class="form-control" placeholder="Actual Price"></div>
<div class="col"><input name="sale" class="form-control" placeholder="Sale Price"></div>

<div class="col">
<select name="sold" class="form-control">
<option value="Y">Sold</option>
<option value="N">Pending</option>
</select>
</div>

<button class="btn btn-success col">Add</button>
</form>

<table class="table mt-4">
<thead>
<tr>
<th>ID</th><th>Date</th><th>Item</th><th>Type</th>
<th>Actual Price</th><th>Sale Price</th>
<th>Difference</th><th>Sold</th>
<th>Save</th><th>Delete</th>
</tr>
</thead>

<tbody>
{% for r in records %}
<tr class="{% if r.Sold=='Y' %}table-success{% else %}table-warning{% endif %}">
<form method="POST" action="/update_stock">

<input type="hidden" name="row_id" value="{{r.index}}">

<td><input name="id" value="{{r.ID}}" class="form-control"></td>
<td><input name="date" value="{{r['Date']}}" class="form-control"></td>

<td><input name="item" value="{{r.Item}}" class="form-control"></td>
<td><input name="type" value="{{r.Type}}" class="form-control"></td>

<td><input name="actual" value="{{r['Actual Price']}}" class="form-control"></td>
<td><input name="sale" value="{{r['Sale Price']}}" class="form-control"></td>

<td>{{r.Difference}}</td>

<td>
<select name="sold" class="form-control">
<option value="Y" {% if r.Sold=='Y' %}selected{% endif %}>Y</option>
<option value="N" {% if r.Sold=='N' %}selected{% endif %}>N</option>
</select>
</td>

<td><button class="btn btn-success btn-sm">Save</button></td>

<td>
<a href="/delete_stock/{{r.index}}" class="btn btn-danger btn-sm"
onclick="return confirm('Delete stock?')">Delete</a>
</td>

</form>
</tr>
{% endfor %}
</tbody>
</table>

<div class="row mt-4">
<div class="col-md-7"><canvas id="barChart"></canvas></div>
<div class="col-md-5"><canvas id="pieChart" style="max-height:250px;"></canvas></div>
</div>

</div>

<script>
function toggleSidebar(){
let s=document.getElementById("sidebar");
s.style.display=(s.style.display==="block")?"none":"block";
}

// PIE
new Chart(document.getElementById('pieChart'),{
type:'pie',
data:{labels:['Sold','Pending'],
datasets:[{data:[{{sold}},{{pending}}]}]}
});

// BAR
let items={};
{% for r in records %}
items["{{r.Item}}"]=(items["{{r.Item}}"]||0)+1;
{% endfor %}

new Chart(document.getElementById('barChart'),{
type:'bar',
data:{labels:Object.keys(items),
datasets:[{label:'Stock Count',data:Object.values(items)}]}
});
</script>

</body>
</html>
