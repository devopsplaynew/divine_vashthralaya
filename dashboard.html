
<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container">
<h2 class="mt-3 text-center">Divine Vasthralaya Expense Tracker</h2>

<div class="row text-center mt-4">
<div class="col">Income: ₹{{income}}</div>
<div class="col">Expense: ₹{{expense}}</div>
<div class="col">Balance: ₹{{balance}}</div>
</div>

<form method="POST" action="/add" class="mt-4">
<select name="type" class="form-select w-25 d-inline">
<option>Income</option><option>Expense</option>
</select>
<input name="category" placeholder="Category" class="form-control w-25 d-inline">
<input name="amount" placeholder="Amount" type="number" class="form-control w-25 d-inline">
<button class="btn btn-primary">Add</button>
</form>

<a href="/download" class="btn btn-success mt-3">Download Excel</a>

<canvas id="chart" class="mt-4"></canvas>
</div>

<script>
new Chart(document.getElementById('chart'), {
type: 'bar',
data: {
labels: {{monthly_labels|tojson}},
datasets: [{label:'Monthly Report', data: {{monthly_values|tojson}}}]
}
});
</script>

</body>
</html>
